<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GAGE // Security Datapad</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="boot" class="boot">
    <div class="boot-box">
      <div class="scanline"></div>
      <p class="boot-line">INITIALIZING SECURITY DATAPAD...</p>
      <p class="boot-line delay-1">ACCESSING CREW RECORDS...</p>
      <p class="boot-line delay-2">AUTHENTICATING...</p>
      <p class="boot-line delay-3 granted">ACCESS GRANTED</p>
    </div>
  </div>
  <main class="shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-kicker">SECURITY DATAPAD</div><h1>GAGE</h1><div class="status-dot"><span></span> ONLINE</div></div>
      <nav id="nav" class="nav">
        <button data-view="overview" class="active">Overview</button><button data-view="combat">Combat</button><button data-view="skills">Skills</button><button data-view="gear">Equipment</button><button data-view="bio">Biography</button><button data-view="quotes">Quotes</button><button data-view="rules">Rules</button><button data-view="journal">Journal</button>
      </nav>
      <div class="sidebar-footer"><div>PARTY ROLE</div><strong>Security Chief / Gunner</strong></div>
    </aside>
    <section class="content">
      <header class="topbar"><div><div class="eyebrow">Outer Rim Crew File</div><h2 id="view-title">Overview</h2></div><button id="sound-toggle" class="mini-btn">Audio: Off</button></header>
      <section id="view" class="view"></section>
    </section>
  </main>
  <div id="modal" class="modal hidden"><div class="modal-card"><button id="modal-close" class="modal-close">×</button><h3 id="modal-title"></h3><div id="modal-body"></div></div></div>
  <script src="js/data.js"></script><script src="js/dice.js"></script><script src="js/app.js"></script>
</body>
</html>
